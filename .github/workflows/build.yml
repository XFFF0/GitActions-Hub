name: Build Cinemana IPA (zsign - No Cert Needed)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Build Unsigned
        run: |
          xcodebuild build \
            -project CinemanaApp.xcodeproj \
            -scheme CinemanaApp \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            | xcpretty

      - name: Package IPA
        run: |
          BUILD_DIR="$RUNNER_TEMP/DerivedData/Build/Products/Release-iphoneos"
          APP_PATH=$(find "$BUILD_DIR" -name "*.app" | head -1)
          echo "App: $APP_PATH"

          mkdir -p "$RUNNER_TEMP/Payload"
          cp -r "$APP_PATH" "$RUNNER_TEMP/Payload/"

          cd "$RUNNER_TEMP"
          zip -r CinemanaApp-unsigned.ipa Payload/
          echo "✅ IPA created"

      - name: Install zsign
        run: |
          brew install openssl || true
          git clone --depth=1 https://github.com/zhlynn/zsign.git /tmp/zsign
          cd /tmp/zsign
          g++ -std=c++17 -O2 \
            -I/usr/local/opt/openssl/include \
            -L/usr/local/opt/openssl/lib \
            -o zsign *.cpp common/*.cpp \
            -lssl -lcrypto -lz || echo "zsign build failed"

      - name: Sign with zsign
        run: |
          if [ -f /tmp/zsign/zsign ]; then
            openssl req -x509 -newkey rsa:2048 \
              -keyout /tmp/key.pem \
              -out /tmp/cert.pem \
              -days 365 -nodes \
              -subj "/CN=CinemanaApp/O=Cinemana/C=IQ" 2>/dev/null

            /tmp/zsign/zsign \
              -k /tmp/key.pem \
              -m /tmp/cert.pem \
              -o "$RUNNER_TEMP/CinemanaApp.ipa" \
              "$RUNNER_TEMP/CinemanaApp-unsigned.ipa"
          else
            cp "$RUNNER_TEMP/CinemanaApp-unsigned.ipa" \
               "$RUNNER_TEMP/CinemanaApp.ipa"
          fi

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: CinemanaApp-${{ github.run_number }}
          path: ${{ runner.temp }}/CinemanaApp.ipa
          retention-days: 30
